<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KMG Studio — Login</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0f1115;color:#f4f4f6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
  .card{background:#181b22;border:1px solid #2a2f3d;border-radius:14px;padding:40px;width:320px;}
  .brand{font-size:20px;font-weight:800;margin-bottom:24px;}
  .brand span{color:#ff6a2c;}
  input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #2a2f3d;
    background:#1f2330;color:#f4f4f6;font-size:14px;box-sizing:border-box;margin-bottom:12px;}
  button{width:100%;padding:10px;border-radius:8px;border:none;background:#ff6a2c;
    color:#fff;font-weight:700;font-size:14px;cursor:pointer;}
  .error{color:#ff6a6a;font-size:13px;margin-bottom:12px;}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">KMG <span>Studio</span></div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <input type="password" name="password" placeholder="Password" autofocus>
      <button type="submit">Enter</button>
    </form>
  </div>
</body>
</html>
